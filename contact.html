<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Platinum Kitchens NY</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Kantumruy+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Platinum Kitchens Logo">
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html" class="btn-outline">Contact</a>
    </nav>
</header>

<section class="contact-section">
    <div class="container">
        <h1>Start Your Project</h1>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Tell us about your kitchen project..." required></textarea>
            <button type="submit" class="btn-primary">Send Inquiry</button>
        </form>
    </div>
</section>

<footer>
    <p>© 2026 Platinum Kitchens NY</p>
</footer>

</body>
</html>
